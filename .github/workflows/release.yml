name: "Release"

on: workflow_dispatch

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `v${{ steps.get-version.outputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            })
            return data.id

  build:
    permissions:
      contents: write
    needs: create-release
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: macos-26-aarch64-apple-darwin

      - name: Install frontend dependencies
        run: bun install

      - name: Build
        run: bun run tauri build --target aarch64-apple-darwin --bundles dmg

      - name: Upload DMG to release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release-id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = parseInt(process.env.RELEASE_ID);
            const dmgDir = 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg';
            const files = fs.readdirSync(dmgDir).filter(f => f.endsWith('.dmg'));
            for (const file of files) {
              const filePath = path.join(dmgDir, file);
              const data = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: file,
                data: data,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': data.length,
                },
              });
              console.log(`Uploaded ${file}`);
            }
